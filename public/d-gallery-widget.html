<!-- ✅ Webflow-safe (scoped) D-Gallery: does NOT change your site font, body, or global styles -->
<div class="d-gallery-scope" id="d-gallery">
  <style>
    /* =========================================================
       SCOPE EVERYTHING to #d-gallery so your Webflow fonts remain
       ========================================================= */

    #d-gallery{
      /* Variables live ONLY inside this gallery */
      --dg-bg: transparent; /* change if you want a gallery-only background */
      --dg-card: rgba(255,255,255,.06);
      --dg-cardBorder: rgba(255,255,255,.10);
      --dg-shadow: 0 18px 45px rgba(0,0,0,.45);
      --dg-radius: 18px;
      --dg-gap: 18px;

      --dg-lbBackdrop: rgba(0,0,0,.72);
      --dg-lbPanel: rgba(14, 18, 28, .92);
      --dg-lbBorder: rgba(255,255,255,.10);
      --dg-text: rgba(255,255,255,.92);

      /* IMPORTANT: keep Webflow font */
      font-family: inherit;
      color: inherit;
      background: var(--dg-bg);
    }

    /* Only inside the gallery */
    #d-gallery, #d-gallery * { box-sizing: border-box; }

    #d-gallery .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 70px;
    }

    /* Grid */
    #d-gallery .grid{
      display: grid;
      gap: var(--dg-gap);
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: stretch;
    }
    @media (max-width: 980px){
      #d-gallery .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px){
      #d-gallery .grid{ grid-template-columns: 1fr; }
    }

    /* Card */
    #d-gallery .card{
      position: relative;
      border-radius: var(--dg-radius);
      background: var(--dg-card);
      border: 1px solid var(--dg-cardBorder);
      box-shadow: var(--dg-shadow);
      overflow: hidden;

      transform: translateY(14px);
      opacity: 0;
      transition:
        opacity 700ms cubic-bezier(.2,.9,.2,1),
        transform 700ms cubic-bezier(.2,.9,.2,1),
        border-color 240ms ease;
      will-change: transform, opacity;
      isolation: isolate;
    }
    #d-gallery .card.is-visible{ opacity: 1; transform: translateY(0); }

    #d-gallery .open{
      display: block;
      width: 100%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
      color: inherit;
      font: inherit; /* keep Webflow font */
    }
    #d-gallery .open:focus-visible{
      outline: 2px solid rgba(125,211,252,.75);
      outline-offset: 3px;
      border-radius: calc(var(--dg-radius) + 6px);
    }

    #d-gallery .media{
      aspect-ratio: 4 / 3;
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,.03);
    }

    /* Parallax layer */
    #d-gallery .parallax{
      position: absolute;
      inset: -10% 0;
      width: 100%;
      height: 120%;
      transform: translate3d(0, var(--py, 0px), 0) scale(1.02);
      transition: transform 220ms ease;
      will-change: transform;
    }
    #d-gallery .parallax img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.05) contrast(1.05);
      transform: scale(1.02);
    }

    /* Hover polish */
    #d-gallery .card::after{
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(800px 220px at 50% 120%, rgba(125,211,252,.16), transparent 55%),
        linear-gradient(to top, rgba(0,0,0,.18), transparent 55%);
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
    }
    #d-gallery .card:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.18);
    }
    #d-gallery .card:hover::after{ opacity: 1; }
    #d-gallery .card:hover .parallax{
      transform: translate3d(0, var(--py, 0px), 0) scale(1.06);
    }

    /* Stagger reveal */
    #d-gallery .card{ transition-delay: calc(var(--i, 0) * 55ms); }

    /* View More */
    #d-gallery .more-wrap{
      display: flex;
      justify-content: center;
      padding: 22px 0 0;
    }
    #d-gallery .view-more{
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.95);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .01em;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
      font: inherit; /* keep Webflow font */
    }
    #d-gallery .view-more:hover{
      transform: translateY(-1px);
      border-color: rgba(125,211,252,.55);
      background: rgba(125,211,252,.14);
    }
    #d-gallery .view-more:focus-visible{
      outline: 2px solid rgba(125,211,252,.80);
      outline-offset: 3px;
    }
    #d-gallery .view-more.is-visible{ display: inline-flex; }

    /* Lightbox */
    #d-gallery .lightbox{
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: var(--dg-lbBackdrop);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 99999;
    }
    #d-gallery .lightbox[aria-hidden="false"]{ display: flex; }

    #d-gallery .lb-panel{
      width: min(980px, 100%);
      background: var(--dg-lbPanel);
      border: 1px solid var(--dg-lbBorder);
      border-radius: 20px;
      box-shadow: 0 30px 90px rgba(0,0,0,.6);
      overflow: hidden;
      transform: translateY(8px) scale(.98);
      opacity: 0;
      transition: transform 220ms ease, opacity 220ms ease;
    }
    #d-gallery .lightbox[aria-hidden="false"] .lb-panel{
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    #d-gallery .lb-top{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 12px 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    #d-gallery .lb-title{
      margin: 0;
      font-size: 14px;
      color: #ffffff;
      letter-spacing: .01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font: inherit; /* keep Webflow font */
    }
    #d-gallery .lb-close{
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.92);
      width: 38px;
      height: 38px;
      border-radius: 12px;
      cursor: pointer;
      display: grid;
      place-items: center;
      font: inherit; /* keep Webflow font */
    }
    #d-gallery .lb-close:hover{ background: rgba(255,255,255,.12); }
    #d-gallery .lb-close:focus-visible{
      outline: 2px solid rgba(125,211,252,.75);
      outline-offset: 2px;
    }

    #d-gallery .lb-media{
      position: relative;
      background: rgba(0,0,0,.25);
      overflow: hidden;
      user-select: none;
      touch-action: none; /* enable pinch/pan/swipe handling */
    }
    #d-gallery .lb-stage{
      width: 100%;
      height: min(70vh, 720px);
      display: grid;
      place-items: center;
      opacity: 1;
      transition: opacity 220ms ease;
    }
    #d-gallery .lb-stage.is-fading{ opacity: 0; }

    #d-gallery .lb-img{
      width: 100%;
      height: 100%;
      max-height: min(70vh, 720px);
      object-fit: contain;
      background: rgba(0,0,0,.30);
      transform: translate3d(0,0,0) scale(1);
      will-change: transform;
    }

    #d-gallery .lb-nav{
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.95);
      width: 44px;
      height: 44px;
      border-radius: 14px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
      z-index: 2;
      font: inherit; /* keep Webflow font */
    }
    #d-gallery .lb-nav:hover{
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.22);
      transform: translateY(-50%) scale(1.02);
    }
    #d-gallery .lb-nav:focus-visible{
      outline: 2px solid rgba(125,211,252,.80);
      outline-offset: 3px;
    }
    #d-gallery .lb-prev{ left: 12px; }
    #d-gallery .lb-next{ right: 12px; }

    /* Bottom bar: centered button, no instruction text */
    #d-gallery .lb-bottom{
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.10);
    }
    #d-gallery .lb-action{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(125,211,252,.22), rgba(125,211,252,.10));
      color: rgba(255,255,255,.95);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .01em;
      white-space: nowrap;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
      font: inherit; /* keep Webflow font */
    }
    #d-gallery .lb-action:hover{
      transform: translateY(-1px);
      border-color: rgba(125,211,252,.55);
      background: linear-gradient(180deg, rgba(125,211,252,.28), rgba(125,211,252,.14));
    }
    #d-gallery .lb-action:focus-visible{
      outline: 2px solid rgba(125,211,252,.80);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce){
      #d-gallery .card,
      #d-gallery .parallax,
      #d-gallery .lb-panel,
      #d-gallery .lb-stage{
        transition: none !important;
      }
      #d-gallery .card{ opacity: 1; transform: none; }
      #d-gallery .parallax{ transform: none !important; }
      #d-gallery .lb-stage{ opacity: 1 !important; }
    }
  </style>

    <div class="more-wrap">

      <div class="lb-bottom">
        <a class="lb-action" id="dgLbAction" href="#" target="_blank" rel="noopener">Explore</a>
      </div>
    </div>
  </div>

        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e868d8e45e33f7aa8781_Xnip2025-12-19_19-12-44.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e868af65e1d0a5360d67_Xnip2025-12-19_19-11-54.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e8689b9e3609b7404d2c_Xnip2025-12-19_19-10-56.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e86840981b751adbabae_Xnip2025-12-19_19-12-34.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e868af65e1d0a5360d67_Xnip2025-12-19_19-11-54.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e8689b9e3609b7404d2c_Xnip2025-12-19_19-10-56.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e86840981b751adbabae_Xnip2025-12-19_19-12-34.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e868e15f8f1ce5565596_Xnip2025-12-19_19-13-53.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e86966a405e5a2d4610f_Xnip2025-12-19_19-14-31.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e869a9cb1d105d753473_Xnip2025-12-19_19-11-30.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e8690fa6228f108fefcf_Xnip2025-12-19_19-11-12.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e869da23eef076ea88a6_Xnip2025-12-19_19-10-46.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e869b0031f8c817fbe30_Xnip2025-12-19_19-13-01.png",
        "https://cdn.prod.website-files.com/692f0ba55905e9d22c848d0d/6945e869a48669fe55a7c023_Xnip2025-12-19_19-10-31.png"
      ];

      const images = imageUrls.map((src, i) => ({ src, title: `D-Gallery Image ${i + 1}` }));

      // Explore mapping: 1–10 Mission, 11–20 Programs, 21–30 IDPC, 31+ Faculty
      function exploreConfigForIndex(oneBasedIndex){
        if (oneBasedIndex >= 1 && oneBasedIndex <= 10) {
          return { text: "Explore Mission", href: "https://d-festival.org/d-festival-mission" };
        }
        if (oneBasedIndex >= 11 && oneBasedIndex <= 20) {
          return { text: "Explore Programs", href: "https://d-festival.org/2026-d-festival-programs" };
        }
        if (oneBasedIndex >= 21 && oneBasedIndex <= 30) {
          return { text: "Explore IDPC", href: "https://d-festival.org/international-d-masters-piano-competition-2026" };
        }
        return { text: "Explore 2026 Faculty", href: "https://d-festival.org/2026-faculty" };
      }

      // -----------------------
      // Memory-safe "View More":
      // Only APPEND 10 at a time (does NOT render all upfront)
      // -----------------------
      const PAGE_SIZE = 10;
      let renderedCount = 0;

      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const activeCards = new Set();
      const revealIO = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          const card = entry.target;
          if (entry.isIntersecting) {
            card.classList.add("is-visible");
            activeCards.add(card);
          } else {
            activeCards.delete(card);
          }
        }
        if (!prefersReducedMotion) requestTick();
      }, { threshold: 0.15, rootMargin: "120px 0px 120px 0px" });

      const imgIO = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          const img = entry.target;
          const src = img.dataset.src;
          if (src) {
            img.src = src;
            img.removeAttribute("data-src");
          }
          imgIO.unobserve(img);
        }
      }, { threshold: 0.01, rootMargin: "300px 0px 300px 0px" });

      function createCard(idx){
        const item = images[idx];
        const card = document.createElement("article");
        card.className = "card";
        card.dataset.index = String(idx);
        card.style.setProperty("--i", idx % 12);

        card.innerHTML = `
          <button class="open" type="button" data-index="${idx}" aria-label="Open ${item.title}">
            <div class="media">
              <div class="parallax">
                <img data-src="${item.src}" alt="${item.title}" loading="lazy" decoding="async" />
              </div>
            </div>
          </button>
        `;

        revealIO.observe(card);
        const img = card.querySelector("img");
        if (img) imgIO.observe(img);

        return card;
      }

      // Show "View More" only when you reach the last rendered image
      let moreIO = null;
      function watchLastVisibleForViewMore(){
        if (moreIO) moreIO.disconnect();
        if (renderedCount <= 0 || renderedCount >= images.length) return;

        const lastIndex = renderedCount - 1;
        const lastCard = gallery.querySelector(`.card[data-index="${lastIndex}"]`);
        if (!lastCard) return;

        moreIO = new IntersectionObserver((entries) => {
          if (entries[0] && entries[0].isIntersecting) {
            viewMoreBtn.classList.add("is-visible");
          }
        }, { threshold: 0.35, rootMargin: "0px 0px 120px 0px" });

        viewMoreBtn.classList.remove("is-visible");
        moreIO.observe(lastCard);
      }

      function appendNextBatch(){
        const prev = renderedCount;
        renderedCount = Math.min(images.length, renderedCount + PAGE_SIZE);

        for (let i = prev; i < renderedCount; i++) {
          gallery.appendChild(createCard(i));
        }

        if (renderedCount >= images.length) {
          viewMoreBtn.classList.remove("is-visible");
          return;
        }

        watchLastVisibleForViewMore();
      }

      viewMoreBtn.addEventListener("click", () => {
        appendNextBatch();
        requestTick();
      });

      // Initial
      appendNextBatch();

      // -----------------------
      // Parallax
      // -----------------------
      let ticking = false;
      function requestTick(){
        if (!ticking) {
          ticking = true;
          requestAnimationFrame(updateParallax);
        }
      }
      function updateParallax(){
        ticking = false;
        if (prefersReducedMotion) return;

        const vh = window.innerHeight || document.documentElement.clientHeight;

        activeCards.forEach(card => {
          const media = card.querySelector(".media");
          const layer = card.querySelector(".parallax");
          if (!media || !layer) return;

          const rect = media.getBoundingClientRect();
          const centerY = rect.top + rect.height / 2;
          const viewportCenter = vh / 2;
          const distance = (centerY - viewportCenter) / (vh / 2);

          const clamped = Math.max(-1, Math.min(1, distance));
          const maxOffset = 14;
          const offset = (-clamped * maxOffset).toFixed(2);
          layer.style.setProperty("--py", `${offset}px`);
        });
      }
      window.addEventListener("scroll", requestTick, { passive: true });
      window.addEventListener("resize", requestTick, { passive: true });
      requestTick();

      // -----------------------
      // Lightbox + pinch zoom + pan + swipe (swipe disabled when zoomed)
      // -----------------------
      const lightbox = scope.querySelector("#dgLightbox");
      const lbTitle  = scope.querySelector("#dgLbTitle");
      const lbClose  = scope.querySelector("#dgLbClose");
      const lbAction = scope.querySelector("#dgLbAction");
      const lbMedia  = scope.querySelector("#dgLbMedia");
      const lbPrev   = scope.querySelector("#dgLbPrev");
      const lbNext   = scope.querySelector("#dgLbNext");
      const lbStage  = scope.querySelector("#dgLbStage");
      const lbImg    = scope.querySelector("#dgLbImg");

      let currentIndex = 0;
      let lastFocusedEl = null;
      let changing = false;

      // Zoom state
      let scale = 1;
      let tx = 0, ty = 0;
      const MIN_SCALE = 1;
      const MAX_SCALE = 3;

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

      function applyZoom(){
        lbImg.style.transform = `translate3d(${tx}px, ${ty}px, 0) scale(${scale})`;
      }
      function resetZoom(){
        scale = 1; tx = 0; ty = 0;
        applyZoom();
      }
      function clampPan(){
        const rect = lbMedia.getBoundingClientRect();
        const maxX = (scale - 1) * rect.width / 2;
        const maxY = (scale - 1) * rect.height / 2;
        tx = clamp(tx, -maxX, maxX);
        ty = clamp(ty, -maxY, maxY);
      }

      function setExplore(oneBasedIndex){
        const cfg = exploreConfigForIndex(oneBasedIndex);
        lbAction.textContent = cfg.text;
        lbAction.href = cfg.href;
      }

      function fadeToImage(index){
        if (changing) return;
        changing = true;

        const total = images.length;
        currentIndex = (index + total) % total;
        const item = images[currentIndex];
        const oneBased = currentIndex + 1;

        resetZoom();

        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduced) {
          lbImg.src = item.src;
          lbImg.alt = item.title;
          lbTitle.textContent = item.title;
          setExplore(oneBased);
          changing = false;
          return;
        }

        lbStage.classList.add("is-fading");
        setTimeout(() => {
          lbImg.onload = () => {
            lbTitle.textContent = item.title;
            setExplore(oneBased);
            lbStage.classList.remove("is-fading");
            changing = false;
          };
          lbImg.src = item.src;
          lbImg.alt = item.title;
        }, 120);
      }

      function openLightbox(index){
        lastFocusedEl = document.activeElement;
        lightbox.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        currentIndex = index;
        fadeToImage(currentIndex);
        lbClose.focus();
      }

      function closeLightbox(){
        lightbox.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        lbImg.src = "";
        resetZoom();
        if (lastFocusedEl && typeof lastFocusedEl.focus === "function") lastFocusedEl.focus();
      }

      function nextImage(){ if (scale > 1.01) return; fadeToImage(currentIndex + 1); }
      function prevImage(){ if (scale > 1.01) return; fadeToImage(currentIndex - 1); }

      // Open from grid (delegation)
      gallery.addEventListener("click", (e) => {
        const btn = e.target.closest(".open");
        if (!btn) return;
        const index = Number(btn.dataset.index);
        if (!Number.isFinite(index)) return;
        openLightbox(index);
      });

      // Close handlers
      lbClose.addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (e) => {
        const panel = e.target.closest(".lb-panel");
        if (!panel) closeLightbox();
      });

      // Nav buttons
      lbNext.addEventListener("click", (e) => { e.stopPropagation(); nextImage(); });
      lbPrev.addEventListener("click", (e) => { e.stopPropagation(); prevImage(); });

      // Keyboard
      document.addEventListener("keydown", (e) => {
        if (lightbox.getAttribute("aria-hidden") === "true") return;

        if (e.key === "Escape") { e.preventDefault(); closeLightbox(); return; }
        if (e.key === "ArrowRight") { e.preventDefault(); nextImage(); return; }
        if (e.key === "ArrowLeft") { e.preventDefault(); prevImage(); return; }

        // Focus trap (close <-> explore)
        if (e.key === "Tab") {
          const focusables = [lbClose, lbAction].filter(Boolean);
          const first = focusables[0];
          const last = focusables[focusables.length - 1];
          if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
          else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      });

      // Pinch-to-zoom + pan + swipe (Pointer Events)
      const pointers = new Map();
      let startX = 0, startY = 0;
      let startTx = 0, startTy = 0;
      let startScale = 1;
      let startDist = 0;

      // Swipe tracking (only when not zoomed)
      let swipeStartX = 0, swipeStartY = 0;
      const SWIPE_THRESHOLD = 45;

      function dist(a,b){
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        return Math.hypot(dx, dy);
      }

      // Double-tap zoom toggle
      let lastTap = 0;
      lbMedia.addEventListener("pointerup", (e) => {
        if (lightbox.getAttribute("aria-hidden") === "true") return;
        const now = Date.now();
        const isDoubleTap = (now - lastTap) < 280;
        lastTap = now;
        if (!isDoubleTap) return;

        if (scale < 1.2) scale = 2;
        else { scale = 1; tx = 0; ty = 0; }
        clampPan();
        applyZoom();
      });

      lbMedia.addEventListener("pointerdown", (e) => {
        if (lightbox.getAttribute("aria-hidden") === "true") return;

        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        try { lbMedia.setPointerCapture(e.pointerId); } catch {}

        if (pointers.size === 1) {
          swipeStartX = e.clientX;
          swipeStartY = e.clientY;

          startX = e.clientX;
          startY = e.clientY;
          startTx = tx;
          startTy = ty;
        }

        if (pointers.size === 2) {
          const [a,b] = Array.from(pointers.values());
          startDist = dist(a,b);
          startScale = scale;
          startTx = tx;
          startTy = ty;
        }
      });

      lbMedia.addEventListener("pointermove", (e) => {
        if (!pointers.has(e.pointerId)) return;
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        // Pinch
        if (pointers.size === 2) {
          const [a,b] = Array.from(pointers.values());
          const d = dist(a,b);
          scale = clamp(startScale * (d / startDist), MIN_SCALE, MAX_SCALE);
          tx = startTx; ty = startTy;
          clampPan();
          applyZoom();
          e.preventDefault?.();
          return;
        }

        // Pan when zoomed
        if (pointers.size === 1 && scale > 1.01) {
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          tx = startTx + dx;
          ty = startTy + dy;
          clampPan();
          applyZoom();
          e.preventDefault?.();
        }
      }, { passive: false });

      lbMedia.addEventListener("pointerup", (e) => {
        if (!pointers.has(e.pointerId)) return;

        // Swipe only when NOT zoomed
        if (pointers.size === 1 && scale <= 1.01) {
          const dx = e.clientX - swipeStartX;
          const dy = e.clientY - swipeStartY;
          if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) >= SWIPE_THRESHOLD) {
            if (dx < 0) nextImage();
            else prevImage();
          }
        }

        pointers.delete(e.pointerId);

        // If one pointer remains, reset baselines
        if (pointers.size === 1) {
          const [only] = Array.from(pointers.values());
          startX = only.x; startY = only.y;
          startTx = tx; startTy = ty;
        }
      });

      lbMedia.addEventListener("pointercancel", (e) => {
        pointers.delete(e.pointerId);
      });

      // (Optional) expose count for debugging
      // console.log("D-Gallery total photos:", images.length);
    })();
  </script>
</div>
